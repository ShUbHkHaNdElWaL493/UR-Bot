networks:
  net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.56.0/24

services:
  ursim:
    image: universalrobots/ursim_e-series
    container_name: ursim
    networks:
      net:
        ipv4_address: 192.168.56.101
    ipc: host
    ports:
      - "5900:5900"
      - "6080:6080"
      - "29999:29999"
      - "30001-30004:30001-30004"
      - "50001-50004:50001-50004"
    volumes:
      - ./resources/externalcontrol-1.0.5.urcap:/urcaps/externalcontrol-1.0.5.jar
      - ./resources/default.installation:/ursim/programs/default.installation
    stdin_open: true
    tty: true
    environment:
      - ROBOT_MODEL=UR5e
  ur_robot:
    image: ur_robot
    container_name: ur_robot
    networks:
      net:
        ipv4_address: 192.168.56.64
    privileged: true
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY}:/root/.Xauthority
    stdin_open: true
    tty: true